name: Build VansonMod

on:

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Install Theos

        run: |

          git clone --depth=1 https://github.com/theos/theos.git $HOME/theos

          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install ldid

        run: |

          brew install ldid || true

      - name: Download iOS SDK

        run: |

          mkdir -p $HOME/theos/sdks

          curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz -o sdk.tar.xz

          tar -xf sdk.tar.xz -C $HOME/theos/sdks

      - name: Build

        env:

          THEOS: ${{ env.THEOS }}

        run: |

          make package FINALPACKAGE=1

      - name: Upload TIPA

        uses: actions/upload-artifact@v4

        with:

          name: VansonMod

          path: packages/*
